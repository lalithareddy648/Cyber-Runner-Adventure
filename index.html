<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Runner Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="instructions-overlay">
        <h2>How to Play</h2>
        <p>🏃 Move your player by pressing the <strong>Arrow Up (↑)</strong> key to jump.</p>
        <p>⚠️ Avoid obstacles! Hitting them ends the game.</p>
        <p>💰 Collect gold coins for extra points.</p>
        <p>🏆 Survive as long as possible — speed increases over time.</p>
        <button id="begin-btn">Start Adventure</button>
    </div>

    <div id="game-container">
        <h1>🏃 Cyber Runner Adventure</h1>
        <p id="score">Score: 0</p>
        <div id="game-area"></div>
        <p id="message"></p>
        <button id="start-btn">Start Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
